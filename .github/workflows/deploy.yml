name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # CI — runs on every push and PR: do the dependencies resolve, does the
  # frontend typecheck and build? The build artifact is reused by deploy so
  # production ships exactly what CI verified.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Backend install
        working-directory: backend
        run: npm ci

      - name: Frontend install
        working-directory: frontend
        run: npm ci

      - name: Frontend typecheck + production build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_INSFORGE_URL: ${{ vars.VITE_INSFORGE_URL }}
          VITE_INSFORGE_ANON_KEY: ${{ vars.VITE_INSFORGE_ANON_KEY }}
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # CD — only on pushes to main: update the backend on the EC2 instance and
  # swap in the frontend build produced above. The previous frontend is kept
  # as /var/www/aika-old for instant manual rollback.
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ vars.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload frontend build
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ vars.EC2_HOST }} "rm -rf ~/dist-new"
          scp -i ~/.ssh/deploy_key -r dist ubuntu@${{ vars.EC2_HOST }}:~/dist-new

      - name: Update backend, health-check, swap frontend
        run: |
          ssh -i ~/.ssh/deploy_key ubuntu@${{ vars.EC2_HOST }} 'bash -s' <<'EOF'
          set -euo pipefail
          cd ~/The-AI-Kubernetes-Agent
          git pull --ff-only
          cd backend
          npm ci --omit=dev
          sudo systemctl restart aika-backend
          sleep 3
          curl -sf localhost:8000/health > /dev/null
          sudo rm -rf /var/www/aika-old
          if [ -d /var/www/aika ]; then sudo mv /var/www/aika /var/www/aika-old; fi
          sudo mv ~/dist-new /var/www/aika
          echo "deployed commit $(git -C ~/The-AI-Kubernetes-Agent rev-parse --short HEAD)"
          EOF
